name: Deploy Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site
      - name: Inject
        env:
          AB708F: ${{ secrets.AB708F }}
          BEFBF0: ${{ secrets.BEFBF0 }}
        run: |
          sudo chown -R "$(id -u):$(id -g)" _site
          python3 -c "
          import os, pathlib, sys
          k1 = os.environ.get('AB708F', '')
          k2 = os.environ.get('BEFBF0', '')
          done = 0
          for idx in pathlib.Path('_site').rglob('*.html'):
              try:
                  txt = idx.read_text(encoding='utf-8')
              except (OSError, UnicodeDecodeError):
                  continue
              out = txt.replace('<!-- 88e009a24729925906 -->', k1) if k1 else txt
              out = out.replace('<!-- ea4ab0c67e8174d063cace5a66868160ec15 -->', k2) if k2 else out
              if out != txt:
                  idx.write_text(out, encoding='utf-8')
                  done += 1
          if done == 0 and (k1 or k2):
              sys.exit(1)
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deploy
        uses: actions/deploy-pages@v4
